<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 300px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      background: #f0f0f0;
    }

    .loaging {
      color: blue;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

  <h1>Weather App</h1>
  <input type="text" id="cityInput" placeholder="Write the city name">
  <button id="searchBtn">search</button>
  <div id="result"></div>

  <script>
    let cityInput = document.querySelector("#cityInput");
    let searchBtn = document.querySelector("#searchBtn");
    let result = document.querySelector("#result");

    const weatherData = {
      " dhaka": {
        temp: 32,
        condition: "sunny",
        humidity: 70
      },
      "chittagong": {
        temp: 30,
        condition: "cloudy",
        humidity: 75
      },
      "sylhet": {
        temp: 28,
        condition: "raining",
        humidity: 85
      }
    };

    function getWeather(city) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          let data = weatherData[city.toLowerCase];
          if (data) {
            resolve(data);
          } else {
            reject("city did't found")
          }
        }, 1500)
      })
    }
    async function searchWeather() {
      let city = cityInput.value.trim();

      if (city === "") {
        result.innerHTML = '<p class="error">enter the city name</p>';
        return;

      }
      try {
        result.innerHTML = '<p class="loading">Loading...</p>';

        let weather = await getWeather(city);

        result.innerHTML = `
                    <h2>${city}</h2>
                    <p>🌡️ temparature: ${weather.temp}°C</p>
                    <p>☁️ area: ${weather.condition}</p>
                    <p>💧 heumidity: ${weather.humidity}%</p>
                `;
      }
      catch (error) {
        result.innerHTML = `<p class="error">Error: ${error}</p>`;
      }
    }
    searchBtn.addEventListener('click', searchWeather);
    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchWeather();
      }
    })
  </script>

</body>

</html>
