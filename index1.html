<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1 id="line1">I love Asha</h1>
  <h1 id="line2">she did't love me</h1>
  <button id="check">Click</button>
</body>
<script>
  let clickButton = document.querySelector("#check");
  let line1 = document.querySelector("#line1");
  let line2 = document.querySelector("#line2");


  clickButton.addEventListener("click", () => {
    console.log("Button clicked!");
    line1.textContent = "Asha is my dream";
    line2.textContent = "But life is different";
  })
</script>

</html>
